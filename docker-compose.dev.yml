# Development override — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./data:/app/data
      - ./trace_app:/app/trace_app
      - ./alembic:/app/alembic
    environment:
      TRACE_JWT_SECRET: dev-secret
    command: sh -c "alembic upgrade head && uvicorn trace_app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY: http://app:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      app:
        condition: service_started

# Development override — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./data:/app/data
      - ./trace_app:/app/trace_app
      - ./alembic:/app/alembic
    environment:
      TRACE_JWT_SECRET: dev-secret
    command: uvicorn trace_app.main:app --host 0.0.0.0 --port 8000 --reload
